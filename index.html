<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassHorses</title>
  <link rel="stylesheet" href="styles.css">

  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</head>
<body>

  <!-- Create Herd Modal -->
  <div id="create-herd-modal" onclick="if(event.target===this) window.closeCreateHerdModal()">
    <div id="create-herd-box">
      <h3>New Herd</h3>
      <label>Name</label>
      <input id="new-herd-name" type="text" placeholder="e.g. Riverside Meadows" maxlength="60"
             onkeydown="if(event.key==='Enter') window.submitCreateHerd()">
      <label>Description</label>
      <textarea id="new-herd-desc" rows="3" placeholder="Optional description..."></textarea>
      <div class="modal-btns">
        <button id="modal-cancel" onclick="window.closeCreateHerdModal()">Cancel</button>
        <button id="modal-create" onclick="window.submitCreateHerd()">Create</button>
      </div>
    </div>
  </div>

  <header>
    <h1>GlassHorses</h1>
    <p class="text-muted">Horse Breeding Simulator</p>
  </header>

  <nav>
    <div id="auth-controls">
      <button id="authorize_button" style="display:none">Authorize Drive</button>
      <button id="signout_button" style="display:none">Sign Out</button>
      <span id="user-name">Not logged in</span>
    </div>
  </nav>

  <main>
    <section id="single-player" class="section">

      <!-- Stable Chrome -->
      <div id="stable-chrome">

        <!-- Herd Tab Bar -->
        <div id="stable-header">
          <div id="stable-header-label">Herd</div>
          <div id="herd-tabs"></div>
          <button id="new-herd-tab" onclick="window.openCreateHerdModal()">+ New</button>
        </div>

        <!-- Canvas Area - Where all game modes render -->
        <div id="canvas-wrap" style="min-height:400px;height:400px;position:relative;">
          <!-- Canvas modules mount here -->
        </div>

        <!-- Action Bar -->
        <div id="action-bar">
          <button id="btn-graze"  class="action-btn" onclick="window.switchMode('graze')">Graze</button>
          <button id="btn-status" class="action-btn" onclick="window.switchMode('status')">Status</button>
          <button id="btn-travel" class="action-btn" onclick="window.switchMode('travel')">Travel</button>
          <button id="btn-sleep"  class="action-btn" onclick="window.switchMode('sleep')">Sleep</button>
        </div>

      </div><!-- /stable-chrome -->

      <!-- Drive Controls -->
      <div style="display: flex; gap: 8px; margin: 16px 0;">
        <button id="drive-test-btn" onclick="window.createPlayerSaveFolder()" style="display:none;">Save to Drive</button>
      </div>
      
      <!-- Drive Status -->
      <div id="drive-status"></div>
      <pre id="content" style="display:none"></pre>

    </section>

    <section id="community-gallery" class="section">
      <h2>Community Gallery</h2>
      <div id="gallery-list">Loading gallery...</div>
    </section>
  </main>

  <!-- Load Supabase first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Core modules -->
  <script src="config.js"></script>
  <script src="horses.js"></script>
  <script src="graze.js"></script>

  <!-- Travel mode — modular sub-files, then orchestrator -->
  <script src="travel/travel-constants.js"></script>
  <script src="travel/travel-background.js"></script>
  <script src="travel/travel-horse.js"></script>
  <script src="travel/travel-obstacles.js"></script>
  <script src="travel/travel-apples.js"></script>
  <script src="travel/travel-checkpoints.js"></script>
  <script src="travel/travel-hud.js"></script>
  <script src="travel/travel.js"></script>

  <script src="sleep.js"></script>
  <script src="status.js"></script>
  <script src="auth.js"></script>
  <script src="drive.js"></script>
  <script src="gallery.js"></script>
  
  <!-- UI Modules -->
  <script src="ui/ui-core.js"></script>
  <script src="ui/ui-mode.js"></script>
  <script src="ui/ui-herds.js"></script>
  <script src="ui/ui-modal.js"></script>
  <script src="ui/ui-status.js"></script>
  
  <!-- Main app -->
  <script src="app.js"></script>

  <script>
  function initializeApp() {
    if (!window.GrazeModule || !window.HorseManager || !window.StatusModule || !window.TravelGame) {
      setTimeout(initializeApp, 100);
      return;
    }
    const canvasWrap = document.getElementById('canvas-wrap');
    if (!canvasWrap) { setTimeout(initializeApp, 100); return; }
    
    if (window.HorseManager && window.onHerdChange) {
      window.HorseManager.onChange(window.onHerdChange);
    }
    if (window.HorseManager && !window.HorseManager.getHorses().length) {
      window.HorseManager.loadDebugHerds();
    }
    if (window.initializeModeUI) {
      window.initializeModeUI();
    }
    console.log('✅ App initialized');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeApp);
  } else {
    initializeApp();
  }
  </script>

</body>
</html>
