<script>
  // Simple initialization - wait for DOM and modules
  function initializeApp() {
    console.log('Initializing app...');
    
    // Check if all required modules are loaded
    if (!window.GrazeModule || !window.HorseManager) {
      console.log('Waiting for modules...');
      setTimeout(initializeApp, 100);
      return;
    }
    
    const canvasWrap = document.getElementById('canvas-wrap');
    if (!canvasWrap) {
      console.log('Waiting for canvas...');
      setTimeout(initializeApp, 100);
      return;
    }
    
    console.log('All systems ready, starting app');
    
    // Set up HorseManager change handler
    if (window.HorseManager && window.onHerdChange) {
      window.HorseManager.onChange(window.onHerdChange);
    }
    
    // Load debug herds (already does this by default, but ensure it's loaded)
    if (window.HorseManager && !window.HorseManager.getHorses().length) {
      window.HorseManager.loadDebugHerds();
    }
    
    // Small delay to ensure everything is ready
    setTimeout(() => {
      // Mount graze mode
      if (window.GrazeModule) {
        console.log('Mounting graze module');
        window.GrazeModule.mount(canvasWrap);
        window.currentMode = 'graze';
        
        // Set graze button as active
        document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
        const grazeBtn = document.getElementById('btn-graze');
        if (grazeBtn) grazeBtn.classList.add('active');
        
        // Update UI
        if (window.refreshHerdTabs) setTimeout(() => window.refreshHerdTabs(), 100);
        if (window.refreshDebugHerdSwitcher) setTimeout(() => window.refreshDebugHerdSwitcher(), 100);
        if (window.renderDebugRoster) setTimeout(() => window.renderDebugRoster(), 100);
        
        console.log('App initialized successfully');
      }
    }, 200);
  }

  // Start initialization when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeApp);
  } else {
    initializeApp();
  }
</script>
