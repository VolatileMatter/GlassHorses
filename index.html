<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassHorses - Horse Breeding Sim</title>
  <link rel="stylesheet" href="styles.css">

  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

  <style>
    /* === MODE SWITCHER === */
    .mode-switcher {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 16px 0 20px;
      flex-wrap: wrap;
    }

    .mode-btn {
      padding: 10px 26px;
      border-radius: 30px;
      font-size: 1em;
      font-weight: bold;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: 2px solid;
      transition: all 0.3s;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
    }

    .mode-btn.graze {
      border-color: #4caf50;
      color: #4caf50;
      box-shadow: 0 0 10px rgba(76,175,80,0.3);
    }
    .mode-btn.graze:hover, .mode-btn.graze.active {
      background: rgba(76,175,80,0.2);
      box-shadow: 0 0 22px rgba(76,175,80,0.6);
      transform: translateY(-2px);
    }

    .mode-btn.travel {
      border-color: #ff9800;
      color: #ff9800;
      box-shadow: 0 0 10px rgba(255,152,0,0.3);
    }
    .mode-btn.travel:hover, .mode-btn.travel.active {
      background: rgba(255,152,0,0.2);
      box-shadow: 0 0 22px rgba(255,152,0,0.6);
      transform: translateY(-2px);
    }

    .mode-btn.sleep {
      border-color: #5c8af5;
      color: #5c8af5;
      box-shadow: 0 0 10px rgba(92,138,245,0.3);
    }
    .mode-btn.sleep:hover, .mode-btn.sleep.active {
      background: rgba(92,138,245,0.2);
      box-shadow: 0 0 22px rgba(92,138,245,0.6);
      transform: translateY(-2px);
    }

    #mode-canvas-container {
      min-height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .mode-label {
      font-size: 0.78em;
      text-align: center;
      margin-bottom: 8px;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>

  <script>
    window.appLoaded = false;
    window.scriptsLoaded = {
      config: false, auth: false, drive: false,
      gallery: false, travel: false, graze: false, sleep: false, app: false
    };

    function checkAllScriptsLoaded() {
      const allLoaded = Object.values(window.scriptsLoaded).every(Boolean);
      if (allLoaded) {
        window.appLoaded = true;
        console.log('✅ All scripts loaded');
        document.dispatchEvent(new CustomEvent('allScriptsLoaded'));
      }
    }

    function handleScriptError(name) {
      console.error(`❌ Failed to load: ${name}.js`);
      window.scriptsLoaded[name] = true;
      checkAllScriptsLoaded();
    }

    // ---- Mode Management ----
    let currentMode = null;

    function switchMode(mode) {
      // Unmount previous
      if (currentMode === 'graze' && window.GrazeModule)   window.GrazeModule.unmount();
      if (currentMode === 'travel' && window.TravelGame)   window.TravelGame.unmount();
      if (currentMode === 'sleep' && window.SleepModule)   window.SleepModule.unmount();

      currentMode = mode;

      // Update button states
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById(`btn-${mode}`);
      if (btn) btn.classList.add('active');

      // Update label
      const labels = {
        graze:  '🌿 Graze — horses eat and restore hunger. Required for breeding.',
        travel: '🏇 Travel — guide your horses past obstacles! SPACE or tap to jump.',
        sleep:  '🌙 Sleep — horses heal injuries, age up, and tick statuses.',
      };
      const labelEl = document.getElementById('mode-label');
      if (labelEl) labelEl.textContent = labels[mode] || '';

      // Mount new
      const container = document.getElementById('mode-canvas-container');
      if (!container) return;

      if (mode === 'graze' && window.GrazeModule)   window.GrazeModule.mount(container);
      if (mode === 'travel' && window.TravelGame)   window.TravelGame.mount(container);
      if (mode === 'sleep' && window.SleepModule)   window.SleepModule.mount(container);
    }

    window.switchMode = switchMode;
  </script>
</head>
<body>
  <header>
    <h1>🐎 GlassHorses</h1>
    <p>Horse Breeding Simulator with Community Gallery</p>
  </header>

  <nav>
    <div id="auth-controls">
      <button id="authorize_button" style="display:none">🔐 Authorize Drive</button>
      <button id="signout_button" style="display:none">🚪 Sign Out</button>
      <span id="user-name">Checking status...</span>
    </div>
  </nav>

  <main>
    <!-- === GAMEPLAY SECTION === -->
    <section id="single-player" class="section">
      <h2>🏇 Your Stable</h2>

      <div class="mode-switcher">
        <button id="btn-graze"  class="mode-btn graze"  onclick="switchMode('graze')">🌿 Graze</button>
        <button id="btn-travel" class="mode-btn travel" onclick="switchMode('travel')">🏕️ Travel</button>
        <button id="btn-sleep"  class="mode-btn sleep"  onclick="switchMode('sleep')">🌙 Sleep</button>
      </div>

      <p id="mode-label" class="mode-label">Select a mode above</p>

      <div id="mode-canvas-container"></div>

      <div class="actions" style="margin-top: 16px;">
        <button id="drive-test-btn" style="display:none">🗄️ Create Player Save</button>
        <button id="breed-btn">🐴 Breed Horses</button>
      </div>

      <div id="drive-status" class="drive-status-container"></div>
      <pre id="content" style="display:none"></pre>
      <div id="drive-debug" style="display:none; margin-top:10px; font-size:0.8em; color:#7f8c8d;"></div>
    </section>

    <!-- === COMMUNITY GALLERY === -->
    <section id="community-gallery" class="section">
      <h2>🌟 Community Gallery</h2>
      <div id="gallery-list">Loading gallery...</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"  onload="window.scriptsLoaded.config=true;  checkAllScriptsLoaded();" onerror="handleScriptError('config')"></script>
  <script src="auth.js"    onload="window.scriptsLoaded.auth=true;    checkAllScriptsLoaded();" onerror="handleScriptError('auth')"></script>
  <script src="drive.js"   onload="window.scriptsLoaded.drive=true;   checkAllScriptsLoaded();" onerror="handleScriptError('drive')"></script>
  <script src="gallery.js" onload="window.scriptsLoaded.gallery=true; checkAllScriptsLoaded();" onerror="handleScriptError('gallery')"></script>
  <script src="travel.js"  onload="window.scriptsLoaded.travel=true;  checkAllScriptsLoaded();" onerror="handleScriptError('travel')"></script>
  <script src="graze.js"   onload="window.scriptsLoaded.graze=true;   checkAllScriptsLoaded();" onerror="handleScriptError('graze')"></script>
  <script src="sleep.js"   onload="window.scriptsLoaded.sleep=true;   checkAllScriptsLoaded();" onerror="handleScriptError('sleep')"></script>
  <script src="app.js"     onload="window.scriptsLoaded.app=true;     checkAllScriptsLoaded();" onerror="handleScriptError('app')"></script>

  <script>
    // Auto-start in Graze mode once scripts ready
    document.addEventListener('allScriptsLoaded', () => {
      setTimeout(() => switchMode('graze'), 150);
    });
    // Fallback if event already fired
    if (window.appLoaded) setTimeout(() => switchMode('graze'), 200);
  </script>

  <div style="position:fixed; bottom:10px; right:10px; z-index:1000;">
    <button onclick="
      const d = document.getElementById('drive-debug');
      d.style.display = d.style.display === 'none' ? 'block' : 'none';
      d.innerHTML = '<strong>Status:</strong><br>Mode: ' + (window.currentMode||'none') + '<br>Scripts: ' + JSON.stringify(window.scriptsLoaded);
    " style="font-size:0.7em; padding:5px; opacity:0.6;">🐛 Debug</button>
  </div>
</body>
</html>
